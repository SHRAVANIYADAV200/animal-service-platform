<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="animal1">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>animal1</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAlPdlBM2Pl2h96LcjAeBg1IOfgJDuE6gA&libraries=places&v=weekly"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    function openRazorpay(options, onSuccess, onDismiss) {
      options.handler = function(response) {
        onSuccess(response.razorpay_payment_id, response.razorpay_order_id, response.razorpay_signature);
      };
      options.modal = {
        ondismiss: function() {
          onDismiss();
        }
      };
      var rzp = new Razorpay(options);
      rzp.open();
    }
  </script>
</head>
<body>
  <!--

</body>
